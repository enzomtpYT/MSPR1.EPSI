services:
  # PostgreSQL Database
  database:
    image: postgres:15-alpine
    container_name: mspr_database
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-etl_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-etl_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # RabbitMQ Message Broker
  rabbitmq:
    image: rabbitmq:3.11-management
    container_name: rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-rabbit}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-rabbit_password}
    ports:
      - "5672:5672"   # AMQP
      - "15672:15672" # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 30s
      timeout: 10s
      retries: 5

  # FastAPI Backend Microservice
  backend:
    build:
      context: ./MSPR1.EPSI-FastAPI
      dockerfile: Dockerfile
    container_name: mspr_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://admin:password@database:5432/etl_db}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://rabbit:rabbit_password@rabbitmq:5672/}
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-this-in-production}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      DEFAULT_ADMIN_EMAIL: ${DEFAULT_ADMIN_EMAIL:-admin@example.com}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:-adminpassword123}
      DEFAULT_ADMIN_IS_ADMIN: ${DEFAULT_ADMIN_IS_ADMIN:-true}
    depends_on:
      database:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    volumes:
      - ./MSPR1.EPSI-FastAPI/src:/app/src

  # ETL Worker Microservice
  etl-worker:
    build:
      context: ./ETL
      dockerfile: Dockerfile
    container_name: mspr_etl_worker
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://admin:password@database:5432/etl_db}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://rabbit:rabbit_password@rabbitmq:5672/}
    depends_on:
      database:
        condition: service_healthy
      rabbitmq:
        condition: service_started

  # Vue.js Frontend Microservice
  frontend:
    build:
      context: ./frontmspr
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000/api/v0}
    container_name: mspr_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:8000/api/v0}
      - VITE_APP_NAME=${VITE_APP_NAME:-HealthAI Coach}

volumes:
  postgres_data:
    name: mspr_postgres_data
  rabbitmq_data:
    name: mspr_rabbitmq_data